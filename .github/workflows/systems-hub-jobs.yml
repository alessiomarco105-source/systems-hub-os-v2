name: Systems Hub Jobs

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Systems Hub job id"
        required: true
        default: "daily-agent-recap"
        type: choice
        options:
          - daily-agent-recap
          - weekly-business-review
          - social-kpi-report

permissions:
  contents: read

concurrency:
  group: systems-hub-${{ github.event.inputs.job_id || github.run_id }}
  cancel-in-progress: false

jobs:
  run-systems-hub-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SYSTEMS_HUB_DEEPSEEK_API_KEY: ${{ secrets.SYSTEMS_HUB_DEEPSEEK_API_KEY }}
      SYSTEMS_HUB_TELEGRAM_OPERATIONS_BOT_TOKEN: ${{ secrets.SYSTEMS_HUB_TELEGRAM_OPERATIONS_BOT_TOKEN }}
      SYSTEMS_HUB_TELEGRAM_OPERATIONS_CHAT_ID: ${{ secrets.SYSTEMS_HUB_TELEGRAM_OPERATIONS_CHAT_ID }}
      SYSTEMS_HUB_TELEGRAM_SOCIAL_BOT_TOKEN: ${{ secrets.SYSTEMS_HUB_TELEGRAM_SOCIAL_BOT_TOKEN }}
      SYSTEMS_HUB_TELEGRAM_SOCIAL_CHAT_ID: ${{ secrets.SYSTEMS_HUB_TELEGRAM_SOCIAL_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Pi
        run: npm install -g @earendil-works/pi-coding-agent@0.79.4

      - name: Link hub
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/bin/hub" "$HOME/.local/bin/hub"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI
        run: |
          hub status
          hub telegram health
          hub job "${{ github.event.inputs.job_id }}" --dry-run

      - name: Run selected job
        run: hub job "${{ github.event.inputs.job_id }}" --notify

      - name: Upload run receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: systems-hub-run-receipts-${{ github.run_id }}
          path: operations/runs/usage/**
          if-no-files-found: warn

      - name: Notify failure
        if: failure()
        run: |
          node runtime/scripts/telegram-notify.mjs \
            --channel operations \
            --text "Systems Hub cloud job failed: ${{ github.event.inputs.job_id }} run ${{ github.run_id }}"
